name: Release Windows exe

# Push a tag like v3.1 -> builds, (optionally) signs, publishes a GitHub
# Release, and writes _latest_version/_download_url/_sha256 into the access
# Gist so every client shows the "Update" button at next login.

on:
  push:
    tags: ["v*"]
    branches: [main]
  pull_request:

permissions:
  contents: write          # create the Release + upload assets

env:
  # secrets are not allowed directly in step `if:` — surface presence here
  HAS_CERT: ${{ secrets.SIGN_PFX_BASE64 != '' }}
  HAS_GIST_TOKEN: ${{ secrets.GIST_TOKEN != '' }}

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests openpyxl keyring pytest
      - run: python -m pytest -q

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Version gate — tag must match APP_VERSION
        shell: python
        run: |
          import os, re, sys
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          src = open("fleetx_toolkit/config.py", encoding="utf-8").read()
          app = re.search(r'APP_VERSION\s*=\s*"([^"]+)"', src).group(1)
          if tag != app:
              sys.exit(f"Tag v{tag} != APP_VERSION '{app}' in config.py — "
                       "bump the constant, commit, re-tag.")
          print(f"version gate ok: v{tag}")

      - name: Install dependencies
        run: pip install requests openpyxl keyring pyinstaller

      - name: Build onefile exe
        run: >
          pyinstaller --onefile --noconsole
          --hidden-import keyring.backends.Windows
          --name FleetX_Toolkit
          FleetX_Toolkit.py

      - name: Code-sign exe (skipped until signing secrets are configured)
        if: env.HAS_CERT == 'true'
        shell: pwsh
        env:
          SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}
          SIGN_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: |
          [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName | Select-Object -Last 1).FullName
          & $signtool sign /f cert.pfx /p $env:SIGN_PFX_PASSWORD `
              /tr http://timestamp.digicert.com /td SHA256 /fd SHA256 `
              dist\FleetX_Toolkit.exe
          & $signtool verify /pa dist\FleetX_Toolkit.exe
          Remove-Item cert.pfx

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $h = (Get-FileHash dist\FleetX_Toolkit.exe -Algorithm SHA256).Hash.ToLower()
          "sha256=$h" | Out-File -Append $env:GITHUB_OUTPUT
          "$h  FleetX_Toolkit.exe" | Out-File -Encoding ascii dist\SHA256SUMS.txt
          Write-Host "SHA256: $h"

      - name: Create GitHub Release + upload exe
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FleetX_Toolkit.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true

      - name: Publish version to access Gist (clients see Update button)
        if: env.HAS_GIST_TOKEN == 'true'
        shell: python
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        run: |
          import json, os, urllib.request

          GIST_ID = "e4d2c83ab2c25f30638c049aa2ec2a29"
          FNAME   = "fleetx_access.json"
          API     = f"https://api.github.com/gists/{GIST_ID}"
          tok     = os.environ["GIST_TOKEN"]
          ver     = os.environ["GITHUB_REF_NAME"].lstrip("v")
          repo    = os.environ["GITHUB_REPOSITORY"]
          dl      = f"https://github.com/{repo}/releases/download/v{ver}/FleetX_Toolkit.exe"
          hdrs    = {"Authorization": f"Bearer {tok}",
                     "Accept": "application/vnd.github+json",
                     "User-Agent": "FleetXToolkit-CI",
                     "X-GitHub-Api-Version": "2022-11-28"}

          # Read-modify-write: only the "_" meta keys change; user rules untouched.
          cur = json.load(urllib.request.urlopen(
                    urllib.request.Request(API, headers=hdrs)))
          content = json.loads(cur["files"][FNAME]["content"])
          content["_latest_version"] = ver
          content["_download_url"]   = dl
          content["_sha256"]         = os.environ["SHA256"]

          body = json.dumps({"files": {FNAME: {
                     "content": json.dumps(content, indent=2)}}}).encode()
          req = urllib.request.Request(API, data=body, headers=hdrs, method="PATCH")
          resp = urllib.request.urlopen(req)
          print("Gist updated:", resp.status, "-> clients update to v" + ver)
